services:
  redis:
    image: redis:8.2
    container_name: banexcoin.redis
    ports:
      - '6379:6379'
    networks:
      - banexcoin-network

  private-database:
    image: postgres:17
    container_name: banexcoin.private-database
    ports:
      - '5440:5432'
    networks:
      - banexcoin-network

  public-database:
    image: postgres:17
    container_name: banexcoin.public-database
    ports:
      - '5441:5432'
    networks:
      - banexcoin-network

  ai:
    build:
      context: ./apps/api/ai
      dockerfile: Dockerfile
    container_name: banexcoin.ai
    ports:
      - '8081:8080'
    volumes:
      - ./.containers/ai-data:/app/data
    networks:
      - banexcoin-network

networks:
  banexcoin-network:
    name: banexcoin-network
