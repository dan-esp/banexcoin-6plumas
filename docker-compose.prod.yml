# Production-like compose. Build + run everything locally to validate before push.
#
#   pnpm prod:up        # build + start (detached)
#   pnpm prod:logs      # tail all services
#   pnpm prod:down      # stop + remove
#   pnpm prod:nuke      # stop + remove + drop volumes
#
# Requires .env.prod at repo root (see .env.prod.example).

name: banexcoin-prod

services:
  # ── Infra ───────────────────────────────────────────────────────────────
  mongo:
    image: mongo:8
    container_name: banexcoin.prod.mongo
    restart: unless-stopped
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo-data:/data/db
    networks: [banexcoin-prod]
    healthcheck:
      test: |
        mongosh --quiet --eval "try { if (rs.status().ok) quit(0) } catch (e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongo:27017'}]}); quit(0) }"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── Apps ────────────────────────────────────────────────────────────────
  ai:
    build:
      context: ./apps/api/ai
      dockerfile: Dockerfile
    image: banexcoin/ai-api:local
    container_name: banexcoin.prod.ai
    restart: unless-stopped
    environment:
      AI_PORT: 8080
      AI_MODEL_PATH: /app/data/model.joblib
      AI_CONTAMINATION: ${AI_CONTAMINATION:-auto}
      AI_N_ESTIMATORS: ${AI_N_ESTIMATORS:-200}
      AI_RANDOM_STATE: ${AI_RANDOM_STATE:-42}
      CLERK_JWKS_URL: ${CLERK_JWKS_URL:?CLERK_JWKS_URL required}
      CLERK_AUTHORIZED_PARTIES: ${CLERK_AUTHORIZED_PARTIES:-}
    ports:
      - '${AI_HOST_PORT:-8081}:8080'
    volumes:
      - ai-data:/app/data
    networks: [banexcoin-prod]
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:8080/health']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  private-api:
    build:
      context: ./apps/api/private
      dockerfile: Dockerfile
    image: banexcoin/private-api:local
    container_name: banexcoin.prod.private-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8080
      STORAGE_ADAPTER: mongodb
      MONGODB_URI: mongodb://mongo:27017/banexcoin?replicaSet=rs0&directConnection=true
      AI_API_URL: http://ai:8080
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:?CLERK_SECRET_KEY required}
      CLERK_AUTHORIZED_PARTIES: ${CLERK_AUTHORIZED_PARTIES:-}
      PAYOUT_ORACLE_PROVIDER_URL: ${PAYOUT_ORACLE_PROVIDER_URL:?PAYOUT_ORACLE_PROVIDER_URL required}
      PAYOUT_ORACLE_PROVIDER_ID: ${PAYOUT_ORACLE_PROVIDER_ID:-external-http}
      PAYOUT_ORACLE_RATE_PATH: ${PAYOUT_ORACLE_RATE_PATH:-rate}
      PAYOUT_ORACLE_TIMESTAMP_PATH: ${PAYOUT_ORACLE_TIMESTAMP_PATH:-}
      PAYOUT_ORACLE_SOURCE_PATH: ${PAYOUT_ORACLE_SOURCE_PATH:-}
      PAYOUT_ORACLE_FRESHNESS_MINUTES: ${PAYOUT_ORACLE_FRESHNESS_MINUTES:-60}
      PAYOUT_ORACLE_MIN_RATE: ${PAYOUT_ORACLE_MIN_RATE:-1}
      PAYOUT_ORACLE_MAX_RATE: ${PAYOUT_ORACLE_MAX_RATE:-20}
    ports:
      - '${PRIVATE_API_HOST_PORT:-4000}:8080'
    depends_on:
      mongo:
        condition: service_healthy
      ai:
        condition: service_healthy
    networks: [banexcoin-prod]
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:8080/']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  public-api:
    build:
      context: ./apps/api/public
      dockerfile: Dockerfile
    image: banexcoin/public-api:local
    container_name: banexcoin.prod.public-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8080
      MONGODB_URI: mongodb://mongo:27017/banexcoin?replicaSet=rs0&directConnection=true
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:?CLERK_SECRET_KEY required}
      CLERK_AUTHORIZED_PARTIES: ${CLERK_AUTHORIZED_PARTIES:-}
      SEED_ENABLED: ${SEED_ENABLED:-false}
      SEED_FORCE: ${SEED_FORCE:-false}
    ports:
      - '${PUBLIC_API_HOST_PORT:-5000}:8080'
    depends_on:
      mongo:
        condition: service_healthy
      private-api:
        condition: service_started
    networks: [banexcoin-prod]
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:8080/']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL required}
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:?NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY required}
        NEXT_PUBLIC_CLERK_SIGN_IN_URL: ${NEXT_PUBLIC_CLERK_SIGN_IN_URL:-/sign-in}
        NEXT_PUBLIC_CLERK_SIGN_UP_URL: ${NEXT_PUBLIC_CLERK_SIGN_UP_URL:-/sign-up}
    image: banexcoin/web-client:local
    container_name: banexcoin.prod.frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8080
      HOSTNAME: 0.0.0.0
      PRIVATE_API_URL: ${PRIVATE_API_URL:-http://private-api:8080}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:?CLERK_SECRET_KEY required}
    ports:
      - '${FRONTEND_HOST_PORT:-3000}:8080'
    depends_on:
      public-api:
        condition: service_started
    networks: [banexcoin-prod]
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:8080/']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  banexcoin-prod:
    name: banexcoin-prod
    driver: bridge

volumes:
  mongo-data:
  ai-data:
